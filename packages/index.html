<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Basis Package Registry</title>
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=inter:400,500,600,700" rel="stylesheet">
<style>
  :root{
    --bg:#100f27; --panel:#15142e; --surface:#1a1937; --surface-hover:#221f44; --surface-muted:#13122b;
    --border:rgba(255,255,255,.10); --border-strong:rgba(255,255,255,.18);
    --text:#f4f2ff; --muted:#b7b3d6; --secondary:#9c97c2; --dim:#6e699a;
    --brand:#ef1237; --brand-hover:#ff2c50; --purple:#9333ea; --pink:#ec4899; --blue:#3b82f6; --success:#22c55e;
    --grad-brand:linear-gradient(90deg,#ef1237,#9333ea);
    --grad-hero:linear-gradient(135deg,rgba(239,18,55,.20),rgba(236,72,153,.14),rgba(147,51,234,.16));
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--text);
    font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; line-height:1.5;
  }
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px}

  /* nav */
  header.nav{position:sticky;top:0;z-index:20;background:rgba(16,15,39,.82);backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border)}
  .nav-inner{display:flex;align-items:center;gap:20px;height:64px}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700}
  .logo{width:34px;height:34px;border-radius:9px;background:var(--grad-brand);display:grid;place-items:center;
    font-weight:800;color:#fff;font-size:18px;box-shadow:0 6px 18px rgba(239,18,55,.35)}
  .brand small{display:block;font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.02em}
  .nav-links{margin-left:auto;display:flex;align-items:center;gap:8px}
  .nav-links a{padding:8px 14px;border-radius:10px;color:var(--secondary);font-weight:500;font-size:14px}
  .nav-links a:hover{color:var(--text);background:var(--surface-hover)}
  .btn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border-strong);background:transparent;
    color:var(--text);font-weight:600;font-size:13px;padding:9px 16px;border-radius:12px;cursor:pointer;
    font-family:inherit;transition:.15s}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--grad-brand);border:0;color:#fff}
  .btn.primary:hover{filter:brightness(1.08);color:#fff}
  .btn.sm{padding:7px 12px;font-size:12px;border-radius:10px}

  /* hero */
  .hero{background:var(--grad-hero);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
  .hero::after{content:"";position:absolute;right:-80px;top:-120px;width:360px;height:360px;border-radius:50%;
    background:radial-gradient(circle,rgba(147,51,234,.30),transparent 60%);filter:blur(30px)}
  .hero-inner{padding:64px 0 56px;position:relative;z-index:1}
  .eyebrow{color:var(--brand);font-weight:700;letter-spacing:.22em;font-size:12px;text-transform:uppercase}
  h1.title{font-size:44px;font-weight:700;letter-spacing:-.02em;margin:10px 0 8px}
  .hero p{color:var(--muted);font-size:17px;margin:0 0 28px;max-width:640px}
  .search{display:flex;align-items:center;gap:12px;background:var(--surface-muted);border:1px solid var(--border);
    border-radius:14px;padding:6px 6px 6px 18px;max-width:720px;box-shadow:0 12px 40px rgba(0,0,0,.25)}
  .search:focus-within{border-color:var(--brand)}
  .search svg{flex:0 0 auto;opacity:.6}
  .search input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:16px;font-family:inherit;padding:10px 0}
  .search input::placeholder{color:var(--dim)}

  /* layout */
  .layout{display:grid;grid-template-columns:260px 1fr;gap:28px;padding:36px 0 80px}
  .sidebar{position:sticky;top:88px;align-self:start;display:flex;flex-direction:column;gap:22px}
  .filter-group h4{margin:0 0 10px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
  .chips{display:flex;flex-direction:column;gap:4px}
  .chip{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;border-radius:10px;
    cursor:pointer;color:var(--secondary);font-size:14px;font-weight:500;border:1px solid transparent}
  .chip:hover{background:var(--surface-hover);color:var(--text)}
  .chip.active{background:var(--surface);border-color:var(--border-strong);color:var(--text)}
  .chip .count{font-size:11px;color:var(--dim);background:var(--surface-muted);border-radius:999px;padding:1px 8px}
  .chip .dot{width:8px;height:8px;border-radius:50%}
  .dot.curated{background:var(--brand)} .dot.community{background:var(--purple)} .dot.nuget{background:var(--blue)} .dot.all{background:var(--dim)}

  /* results */
  .results-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
  .results-head .count{color:var(--muted);font-size:14px}
  .results-head .count b{color:var(--text)}
  select.sort{background:var(--surface-muted);color:var(--text);border:1px solid var(--border);border-radius:10px;
    padding:9px 12px;font-family:inherit;font-size:13px;cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;
    display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:.16s;position:relative}
  .card:hover{border-color:var(--border-strong);transform:translateY(-2px);box-shadow:0 14px 40px rgba(0,0,0,.30)}
  .card-top{display:flex;align-items:flex-start;gap:12px}
  .avatar{width:46px;height:46px;flex:0 0 auto;border-radius:12px;background:var(--surface-muted);border:1px solid var(--border);
    display:grid;place-items:center;font-size:24px}
  .card h3{margin:0;font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .card .by{color:var(--dim);font-size:12px;margin-top:2px}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:3px 8px;border-radius:999px;white-space:nowrap}
  .badge.curated{background:rgba(239,18,55,.16);color:#ff6b81;border:1px solid rgba(239,18,55,.35)}
  .badge.community{background:rgba(147,51,234,.16);color:#c084fc;border:1px solid rgba(147,51,234,.35)}
  .badge.nuget{background:rgba(59,130,246,.16);color:#7dabff;border:1px solid rgba(59,130,246,.35)}
  .desc{color:var(--muted);font-size:13.5px;margin:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .tags{display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;color:var(--secondary);background:var(--surface-muted);border:1px solid var(--border);border-radius:999px;padding:2px 9px}
  .card-foot{display:flex;align-items:center;gap:14px;margin-top:auto;padding-top:12px;border-top:1px solid var(--border);
    color:var(--dim);font-size:12px}
  .stat{display:flex;align-items:center;gap:5px}
  .card-foot .btn{margin-left:auto}

  .empty{grid-column:1/-1;text-align:center;padding:70px 0;color:var(--muted)}
  .empty h3{color:var(--text);margin:0 0 6px}

  /* modal */
  .modal-backdrop{position:fixed;inset:0;background:rgba(5,4,18,.66);backdrop-filter:blur(4px);z-index:40;
    display:grid;place-items:center;padding:24px}
  .modal-backdrop.hidden{display:none}
  .modal{background:var(--panel);border:1px solid var(--border-strong);border-radius:20px;max-width:640px;width:100%;
    max-height:88vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .modal-head{display:flex;align-items:flex-start;gap:16px;padding:26px 26px 18px;border-bottom:1px solid var(--border)}
  .modal-head .avatar{width:56px;height:56px;font-size:30px}
  .modal-head h2{margin:0;font-size:22px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .modal-head .by{font-size:13px;margin-top:4px}
  .modal-body{padding:22px 26px 26px;display:flex;flex-direction:column;gap:18px}
  .stats-row{display:flex;gap:22px;color:var(--muted);font-size:13px;flex-wrap:wrap}
  .stats-row b{color:var(--text)}
  .section-label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);margin-bottom:8px}
  pre.code{background:#0c0b1f;border:1px solid var(--border);border-radius:12px;padding:14px 16px;overflow:auto;
    font-family:'Cascadia Mono',Consolas,monospace;font-size:12.5px;color:#d7d3f5;margin:0;position:relative}
  .code-wrap{position:relative}
  .copy{position:absolute;top:8px;right:8px}
  .install-method{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px}
  .install-method h5{margin:0 0 10px;font-size:14px;display:flex;align-items:center;gap:8px}
  .method-num{width:20px;height:20px;border-radius:6px;background:var(--grad-brand);color:#fff;display:grid;place-items:center;font-size:11px;font-weight:700}
  .close-x{position:absolute;top:18px;right:20px;cursor:pointer;color:var(--dim);font-size:22px;line-height:1;border:0;background:0;font-family:inherit}
  .close-x:hover{color:var(--text)}
  label.field{display:block;font-size:13px;color:var(--muted);margin-bottom:14px}
  label.field span{display:block;margin-bottom:6px;color:var(--secondary);font-weight:500}
  .field input,.field textarea,.field select{width:100%;background:var(--surface-muted);border:1px solid var(--border);
    border-radius:10px;padding:10px 12px;color:var(--text);font-family:inherit;font-size:14px;outline:0}
  .field input:focus,.field textarea:focus{border-color:var(--brand)}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border-strong);
    padding:12px 20px;border-radius:12px;font-size:14px;z-index:60;box-shadow:0 12px 40px rgba(0,0,0,.4);opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1}
  .toast.ok{border-color:rgba(34,197,94,.5)} .toast.err{border-color:rgba(239,18,55,.5)}

  footer{border-top:1px solid var(--border);padding:28px 0;color:var(--dim);font-size:13px}
  footer .wrap{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  footer a:hover{color:var(--text)}

  @media(max-width:880px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:static;flex-direction:row;flex-wrap:wrap;gap:16px}
    h1.title{font-size:34px}
  }
</style>
</head>
<body>
<header class="nav">
  <div class="wrap nav-inner">
    <a class="brand" href="/">
      <div class="logo">B</div>
      <div>BasisVR<small>Package Registry</small></div>
    </a>
    <nav class="nav-links">
      <a href="#" id="navBrowse">Packages</a>
      <a href="https://github.com/BasisVR/BasisPackageManager" target="_blank" rel="noopener">Get the app</a>
      <a href="https://github.com/BasisVR" target="_blank" rel="noopener">GitHub</a>
      <button class="btn primary sm" id="submitBtn">Submit a package</button>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="wrap hero-inner">
    <div class="eyebrow">Package Registry</div>
    <h1 class="title">Find packages for Basis</h1>
    <p>Community and curated packages that work with BasisVR — install them straight from the Basis Package Manager.</p>
    <div class="search">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="text" placeholder="Search packages, authors, tags…" autocomplete="off"/>
    </div>
  </div>
</section>

<main class="wrap layout">
  <aside class="sidebar">
    <div class="filter-group">
      <h4>Source</h4>
      <div class="chips" id="sourceChips"></div>
    </div>
    <div class="filter-group">
      <h4>Category</h4>
      <div class="chips" id="categoryChips"></div>
    </div>
  </aside>

  <section class="results">
    <div class="results-head">
      <div class="count" id="count"></div>
      <select class="sort" id="sort">
        <option value="popular">Sort: Popular</option>
        <option value="stars">Most stars</option>
        <option value="forks">Most forks</option>
        <option value="updated">Recently updated</option>
        <option value="name">Name (A–Z)</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </section>
</main>

<footer><div class="wrap">
  <span>Basis Package Registry</span>
  <a href="https://basisvr.org" target="_blank" rel="noopener">basisvr.org</a>
  <a href="https://github.com/BasisVR/BasisPackageManager" target="_blank" rel="noopener">Basis Package Manager</a>
  <span style="margin-left:auto">MIT licensed</span>
</div></footer>

<div class="modal-backdrop hidden" id="modal"></div>
<div class="modal-backdrop hidden" id="submitModal"></div>
<div class="toast" id="toast"></div>

<script>
const state = { search:"", source:"all", category:"all", sort:"popular" };
const REPO = "BasisVR/BasisPackageManager";
let RAW = [];   // full package list, loaded once
let ALL = [];   // current filtered + sorted view

const esc = s => (s??"").toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hostOf = p => { const u = (p.repoUrl||p.gitUrl||'').toLowerCase(); return u.includes('gitlab')?'GitLab':u.includes('github')?'GitHub':''; };
const fmtNum = n => n>=1e9 ? (n/1e9).toFixed(1).replace(/\.0$/,'')+'B'
  : n>=1e6 ? (n/1e6).toFixed(1).replace(/\.0$/,'')+'M'
  : n>=1e3 ? (n/1e3).toFixed(1).replace(/\.0$/,'')+'K' : ''+n;

function toast(msg, kind){
  const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show '+(kind||'');
  setTimeout(()=>t.className='toast',2600);
}
async function copy(text,btn){
  try{ await navigator.clipboard.writeText(text); if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1400);} }
  catch{ toast('Copy failed','err'); }
}

async function fetchAll(){
  const res = await fetch('packages.json',{cache:'no-cache'});
  RAW = await res.json();
}

function load(){   // client-side filter + sort over the full list (static-host friendly)
  let q = RAW.slice();
  const s = state.search.trim().toLowerCase();
  if(s) q = q.filter(p =>
    p.name.toLowerCase().includes(s) || p.id.toLowerCase().includes(s) ||
    (p.description||'').toLowerCase().includes(s) || (p.author||'').toLowerCase().includes(s) ||
    (p.tags||[]).some(t=>t.toLowerCase().includes(s)));
  if(state.source!=='all') q = q.filter(p=>p.source===state.source);
  if(state.category!=='all') q = q.filter(p=>p.category.toLowerCase()===state.category.toLowerCase());
  const by = {
    forks:(a,b)=>b.forks-a.forks, stars:(a,b)=>b.stars-a.stars,
    updated:(a,b)=>(b.updated||'').localeCompare(a.updated||''),
    name:(a,b)=>a.name.localeCompare(b.name),
    popular:(a,b)=>(b.stars-a.stars)||(b.forks-a.forks),
  };
  q.sort(by[state.sort]||by.popular);
  ALL = q;
  renderGrid();
}

function buildFilters(){
  const all = RAW;
  const bySource = s => all.filter(p=>p.source===s).length;
  const sources = [
    {key:'all',label:'All packages',count:all.length,dot:'all'},
    {key:'curated',label:'Curated',count:bySource('curated'),dot:'curated'},
    {key:'community',label:'Community',count:bySource('community'),dot:'community'},
  ];
  document.getElementById('sourceChips').innerHTML = sources.map(s=>
    `<div class="chip ${s.key===state.source?'active':''}" data-source="${s.key}">
       <span style="display:flex;align-items:center;gap:9px"><span class="dot ${s.dot}"></span>${esc(s.label)}</span>
       <span class="count">${s.count}</span></div>`).join('');

  const cats = [...new Set(all.map(p=>p.category))].sort((a,b)=>a.localeCompare(b));
  const catList = ['all',...cats];
  document.getElementById('categoryChips').innerHTML = catList.map(c=>{
    const n = c==='all' ? all.length : all.filter(p=>p.category.toLowerCase()===c.toLowerCase()).length;
    const label = c==='all' ? 'All categories' : c;
    return `<div class="chip ${c.toLowerCase()===state.category.toLowerCase()?'active':''}" data-category="${esc(c)}">
       <span>${esc(label)}</span><span class="count">${n}</span></div>`;
  }).join('');

  document.querySelectorAll('[data-source]').forEach(el=>el.onclick=()=>{state.source=el.dataset.source;refreshChips();load();});
  document.querySelectorAll('[data-category]').forEach(el=>el.onclick=()=>{state.category=el.dataset.category;refreshChips();load();});
}
function refreshChips(){
  document.querySelectorAll('[data-source]').forEach(el=>el.classList.toggle('active',el.dataset.source===state.source));
  document.querySelectorAll('[data-category]').forEach(el=>el.classList.toggle('active',el.dataset.category.toLowerCase()===state.category.toLowerCase()));
}

function renderGrid(){
  const grid = document.getElementById('grid');
  document.getElementById('count').innerHTML = `<b>${ALL.length}</b> package${ALL.length===1?'':'s'}`;
  if(!ALL.length){ grid.innerHTML = `<div class="empty"><h3>No packages found</h3><p>Try a different search or filter.</p></div>`; return; }
  grid.innerHTML = ALL.map(p=>`
    <div class="card" data-id="${esc(p.id)}">
      <div class="card-top">
        <div class="avatar">${esc(p.icon||'📦')}</div>
        <div style="min-width:0">
          <h3>${esc(p.name)} <span class="badge ${esc(p.source)}">${esc(p.source)}</span></h3>
          <div class="by">by ${esc(p.author)}${hostOf(p)?' · '+hostOf(p):''}</div>
        </div>
      </div>
      <p class="desc">${esc(p.description)}</p>
      <div class="tags">${(p.tags||[]).slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
      <div class="card-foot">
        <span class="stat">⭐ ${fmtNum(p.stars)}</span>
        <span class="stat">⑂ ${fmtNum(p.forks)}</span>
        <span class="stat">v${esc(p.version)}</span>
        <button class="btn sm primary">Install</button>
      </div>
    </div>`).join('');
  grid.querySelectorAll('.card').forEach(c=>c.onclick=()=>openDetail(c.dataset.id));
}

function installMethods(p){
  const dep = `"${esc(p.id)}": "${esc(p.gitUrl||'')}"`;
  return `
    <div class="install-method">
      <h5><span class="method-num">1</span> In the Basis Package Manager</h5>
      <p class="desc" style="-webkit-line-clamp:3">Open <b>Packages → Add from Git URL</b> (GitHub or GitLab) and paste:</p>
      <div class="code-wrap"><pre class="code">${esc(p.repoUrl||p.gitUrl||'')}</pre><button class="btn sm copy" data-copy="${esc(p.repoUrl||p.gitUrl||'')}">Copy</button></div>
    </div>
    <div class="install-method">
      <h5><span class="method-num">2</span> Or add to Packages/manifest.json</h5>
      <div class="code-wrap"><pre class="code">${esc(dep)}</pre><button class="btn sm copy" data-copy='${esc(dep)}'>Copy</button></div>
    </div>`;
}

async function openDetail(id){
  const p = ALL.find(x=>x.id===id) || RAW.find(x=>x.id===id);
  if(!p) return;
  const deps = p.dependencies ? Object.entries(p.dependencies).map(([k,v])=>`${esc(k)} ${esc(v)}`).join(', ') : '';
  const m = document.getElementById('modal');
  m.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
    <button class="close-x" onclick="closeModals()">✕</button>
    <div class="modal-head">
      <div class="avatar">${esc(p.icon||'📦')}</div>
      <div style="min-width:0">
        <h2>${esc(p.name)} <span class="badge ${esc(p.source)}">${esc(p.source)}</span></h2>
        <div class="by">by ${p.authorUrl?`<a href="${esc(p.authorUrl)}" target="_blank" rel="noopener" style="color:var(--secondary);text-decoration:underline">${esc(p.author)}</a>`:esc(p.author)} · ${esc(p.category)}${hostOf(p)?' · '+hostOf(p):''}</div>
      </div>
    </div>
    <div class="modal-body">
      <p style="margin:0;color:var(--muted)">${esc(p.description)}</p>
      <div class="stats-row">
        <span>⭐ <b>${fmtNum(p.stars)}</b> stars</span>
        <span>⑂ <b>${fmtNum(p.forks)}</b> forks</span>
        <span><b>v${esc(p.version)}</b></span>
        ${p.unity?`<span>Unity <b>${esc(p.unity)}</b></span>`:''}
        <span>Updated <b>${esc(p.updated)}</b></span>
      </div>
      ${deps?`<div><div class="section-label">Dependencies</div><div class="tags">${Object.entries(p.dependencies).map(([k,v])=>`<span class="tag">${esc(k)} ${esc(v)}</span>`).join('')}</div></div>`:''}
      <div><div class="section-label">How to install</div>${installMethods(p)}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${p.repoUrl?`<a class="btn sm" href="${esc(p.repoUrl)}" target="_blank" rel="noopener">Repository ↗</a>`:''}
        ${p.source==='nuget'&&p.nugetId?`<a class="btn sm" href="https://www.nuget.org/packages/${encodeURIComponent(p.nugetId)}" target="_blank" rel="noopener">NuGet.org ↗</a>`:''}
      </div>
    </div>
  </div>`;
  m.classList.remove('hidden');
  m.querySelectorAll('.copy').forEach(b=>b.onclick=e=>{e.stopPropagation();copy(b.dataset.copy,b);});
}

function openSubmit(){
  const m = document.getElementById('submitModal');
  m.innerHTML = `<div class="modal" onclick="event.stopPropagation()">
    <button class="close-x" onclick="closeModals()">✕</button>
    <div class="modal-head" style="border-bottom:1px solid var(--border)">
      <div class="avatar">➕</div>
      <div><h2>Submit a package</h2><div class="by">Share a Basis-compatible UPM or NuGet package with the community.</div></div>
    </div>
    <div class="modal-body">
      <form id="submitForm">
        <div class="field-row">
          <label class="field"><span>Package id *</span><input name="id" placeholder="com.you.mypackage or NuGetId" required></label>
          <label class="field"><span>Display name *</span><input name="name" placeholder="My Package" required></label>
        </div>
        <label class="field"><span>Description</span><textarea name="description" rows="2" placeholder="What does it do?"></textarea></label>
        <div class="field-row">
          <label class="field"><span>Author</span><input name="author" placeholder="Your name"></label>
          <label class="field"><span>Category</span><input name="category" placeholder="Tools" list="catList"></label>
        </div>
        <div class="field-row">
          <label class="field"><span>Source</span>
            <select name="source"><option value="community">community</option><option value="curated">curated</option></select></label>
          <label class="field"><span>Version</span><input name="version" placeholder="1.0.0"></label>
        </div>
        <label class="field"><span>Git URL (UPM) *</span><input name="gitUrl" placeholder="https://github.com/you/repo.git?path=Packages/com.you.x   or   https://gitlab.com/…" required></label>
        <label class="field"><span>Repository URL</span><input name="repoUrl" placeholder="https://github.com/you/repo  or  https://gitlab.com/you/repo"></label>
        <label class="field"><span>Tags (comma-separated)</span><input name="tags" placeholder="tools, editor"></label>
        <button class="btn primary" type="submit" style="width:100%;justify-content:center">Submit package</button>
      </form>
    </div>
  </div>
  <datalist id="catList"></datalist>`;
  m.classList.remove('hidden');
  document.getElementById('submitForm').onsubmit = submitPackage;
}

function submitPackage(e){
  e.preventDefault();
  const f = e.target; const g = n => (f.elements[n]?.value||'').trim();
  const pkg = {
    id:g('id'), name:g('name'), description:g('description'),
    author:g('author')||'Community', category:g('category')||'Misc',
    tags: g('tags') ? g('tags').split(',').map(t=>t.trim()).filter(Boolean) : [],
    source:g('source')||'community', gitUrl:g('gitUrl')||null, repoUrl:g('repoUrl')||null,
    unity:g('unity')||null, version:g('version')||'1.0.0',
    downloads:0, stars:0, icon:'📦', updated:new Date().toISOString().slice(0,10)
  };
  if(!pkg.id||!pkg.name){ toast('Package id and name are required','err'); return; }
  if(!pkg.gitUrl){ toast('A Git URL (GitHub or GitLab) is required','err'); return; }
  const body = "### Package submission\n\nAdd this entry to `src/BasisPM.Server/seed/packages.json`:\n\n```json\n"
    + JSON.stringify(pkg,null,2) + "\n```\n";
  const url = `https://github.com/${REPO}/issues/new?labels=package-submission&title=`
    + encodeURIComponent(`Add package: ${pkg.name}`) + `&body=` + encodeURIComponent(body);
  window.open(url,'_blank','noopener');
  closeModals();
  toast('Opening a GitHub issue to submit…','ok');
}

function closeModals(){ document.getElementById('modal').classList.add('hidden'); document.getElementById('submitModal').classList.add('hidden'); }
document.getElementById('modal').onclick = closeModals;
document.getElementById('submitModal').onclick = closeModals;
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModals(); });
document.getElementById('submitBtn').onclick = openSubmit;
document.getElementById('navBrowse').onclick = e=>{e.preventDefault();window.scrollTo({top:0,behavior:'smooth'});};

let searchTimer;
document.getElementById('search').oninput = e=>{ clearTimeout(searchTimer); state.search=e.target.value; searchTimer=setTimeout(load,180); };
document.getElementById('sort').onchange = e=>{ state.sort=e.target.value; load(); };

(async function init(){ await fetchAll(); buildFilters(); load(); })();
</script>
</body>
</html>
